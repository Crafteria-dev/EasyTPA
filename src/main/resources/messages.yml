# Warp
warp-not-found: "<red>Le warp <gold><warp></gold> est introuvable."
warp-not-yours: "<red>Vous ne pouvez pas supprimer le warp <gold><warp></gold> car vous n'en êtes pas le créateur."
warp-success: "<green>Téléporté au warp <gold><warp></gold>."
