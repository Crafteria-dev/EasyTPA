home-deleted: "<green>Home <gold><home></gold> supprimé."
home-list: "<yellow>Vos homes : <gold><homes></gold>"
home-list-empty: "<yellow>Vous n'avez aucun home. Utilisez <gold>/sethome</gold>."
home-limit-reached: "<red>Vous avez atteint la limite de <gold><max></gold> home(s). Supprimez-en un d'abord."
warp-limit-reached: "<red>Vous avez atteint votre limite de <gold><max></gold> warp(s). Supprimez-en un avec <gold>/delwarp</gold>."
